name: Build and Push Edge AI Images

# This tells GitHub to run this script every time you push code
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code from your repository
      - name: Check out the repo
        uses: actions/checkout@v4

      # Step 2: Log into Docker Hub securely
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build and push the Capture module
      - name: Build and push Capture
        uses: docker/build-push-action@v5
        with:
          context: ./capture
          push: true
          tags: mdasaad/traffic-capture:latest

      # Step 4: Build and push the Detector module
      - name: Build and push Detector
        uses: docker/build-push-action@v5
        with:
          context: ./detector
          push: true
          tags: mdasaad/traffic-detector:latest

      # Step 5: Build and push the Dashboard module
      - name: Build and push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: mdasaad/traffic-dashboard:latest
